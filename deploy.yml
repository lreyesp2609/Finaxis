name: Deploy Finaxis to Azure Container Apps

on:
  push:
    branches: [main]

env:
  RESOURCE_GROUP: rg-finaxis
  ACR_NAME: finaxisregistry
  APP_NAME: finaxis-app
  APP_ENV: finaxis-env
  IMAGE_NAME: finaxis

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login a Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      # Las VITE_* vienen de GitHub Secrets → se inyectan en build time
      # Nunca aparecen en el Dockerfile ni en el repositorio
      - name: Build y push imagen
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            --build-arg VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            --build-arg VITE_GROQ_API_KEY="${{ secrets.VITE_GROQ_API_KEY }}" \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .

          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy a Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}