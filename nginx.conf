server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' *.supabase.co api.groq.com;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # MIME types — incluye .mjs para PDF.js worker y .wasm
    types {
        application/javascript   js mjs;
        application/wasm         wasm;
        text/css                 css;
        text/html                html htm;
        image/svg+xml            svg svgz;
        image/png                png;
        image/jpeg               jpg jpeg;
        image/gif                gif;
        image/x-icon             ico;
        font/woff                woff;
        font/woff2               woff2;
        font/ttf                 ttf;
        font/eot                 eot;
        application/json         json;
        text/plain               txt;
        text/xml                 xml;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml application/wasm;
    gzip_min_length 1024;

    # Assets con cache largo — agrega .mjs y .wasm
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Todas las rutas → index.html (necesario para React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check para Azure Container Apps
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}